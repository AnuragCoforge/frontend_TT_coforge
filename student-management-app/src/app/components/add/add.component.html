<form #studentForm = ngForm (ngSubmit)="addStudent()">
    <div>
        <div>
        <label class="form-label">Student Id:</label>
        <input type = "number"
                name = "id"
                [(ngModel)]="student.id" 
                #id = "ngModel"
                required
                min="1"
                class="form-control"
                >
                <!-- Form - VALIDATION -->
                <div *ngIf="id.invalid && id.touched">
                    <small *ngIf="id.errors?.['required']">Sid is required</small>
                    <small *ngIf="id.errors?.['min']">Sid must be more than 0</small>
                </div>
    </div>
    <div>
        <label class="form-label">Student Name:</label>
        <input type="text" name="sname"
                [(ngModel)]="student.sname"
                #sname = "ngModel"
                required
                minlength="3"
                class="form-control"
                >
                <div *ngIf="sname.invalid && sname.touched">
                    <small *ngIf="sname.errors?.['required']">Student name is required</small>
                    <small *ngIf="sname.errors?.['minlength']">Student name should be minlegth = 3</small>
                </div>
    </div>

    <div>
        <label class="form-label">Course:</label>
        <input type="text" name="course"
                [(ngModel)]="student.course"
                #course = "ngModel"
                required
                class="form-control"
                >
                <div *ngIf="course.invalid && course.touched">
                    <small *ngIf="sname.errors?.['required']">Student name is required</small>
                </div>
    </div>

    <div>
        <button class="btn btn-success" type="submit" [disabled]="studentForm.invalid" >Add Student</button>
    </div>
    </div>

    
</form>

<div>
    <h3 *ngFor="let student of studentList">{{student.id}}--------{{student.sname}}----------{{student.course}}</h3>
</div>
